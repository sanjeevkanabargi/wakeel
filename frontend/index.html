<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Wakeel Chat</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="title">Wakeel Chat</div>
        <div class="subtitle">A minimal ChatGPT-like demo — your messages go to OpenAI</div>
      </header>

      <main class="chat-wrap">
        <div id="chat" class="chat" aria-live="polite"></div>
      </main>

      <form id="composer" class="composer" action="javascript:;">
        <textarea id="message" placeholder="Type your message... (Enter to send, Shift+Enter for newline)"></textarea>
        <button id="send" type="submit" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 21L23 12L2 3V10L17 12L2 14V21Z" fill="currentColor"/></svg>
        </button>
      </form>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
